shadow = true;
shadow-radius = 15;
shadow-opacity = 0.30;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-exclude = [
  "class_g = 'Display'",
  "_GTK_FRAME_EXTENTS@",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "name = 'QTILE_BAR'",
];

fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 5;

inactive-opacity = 1;
active-opacity = 1;
opacity-rule = [
  "50:class_g = 'Display'",
  "85:class_g = 'WEZTERM'",
  "90:class_g = 'code-oss'",
];

corner-radius = 13;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "name = 'QTILE_BAR'",
  "class_g = 'Display'",
  "class_g = 'Xephyr'",
];

backend = "glx";
vsync = true;

blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "name = 'QTILE_BAR'",
];
